<html>
    <head>
        <title>Log In</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/all.css">
        <link rel="stylesheet" href="css/background.css">
        <link rel="stylesheet" href="css/CustomBootstrap.css">
        <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    </head>
    <body>
       <header class="fixed-top">
        <div class="main-header">
        <nav class="navbar">
        <div class="container">
        <a class="navbar-brand" href="HomePage.html">
        <h1 class="logo">Speak2hire</h1>
        </a>
        </div>
        </nav>
        </div>
        </header>
<section class="loginDivsec">
  <div class="container">
    <div class="login-card row">
      <!-- Left Side: Form -->
      <div class="col-md-8 d-flex flex-column justify-content-center p-4">
         <h2 id="typewriter-title" class="text-center mb-4">Good to See You Again</h2>
        <form>
          <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label">Email address</label>
            <input type="email" class="form-control shadow-sm" id="email" placeholder="name@example.com">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control shadow-sm" id="password" placeholder="********">
          </div>
          <div class="mb-2">
            <input type="checkbox" id="remember">
            <label for="remember" class="form-label">Remember Me</label>
          </div>
          <input type="submit" value="Log In" class="btn log-in">
        </form>
        <p class="mt-3">Don't Have An Account? <a href="register.html">Register</a></p>
      </div>
      <!-- Right Side: Image -->
      <div class="col-md-4 d-none d-md-flex align-items-center justify-content-center p-0">
        <img src="images/images.jpeg" alt="interview" class="w-100" style="object-fit:fill;">
      </div>
    </div>
  </div>
</section>
          <script src="js/login.js"></script>
         <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
         <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
     </body>
</html>
