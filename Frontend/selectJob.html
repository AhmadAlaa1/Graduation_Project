<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interview App Landing Page</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/all.css">
  <link rel="stylesheet" href="css/CustomBootstrap.css">
  <link rel="stylesheet" href="css/landingscape.css">
  <link rel="stylesheet" href="css/selectjob.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

 <!-- HEADER -->
<header class="fixed-top">
  <div class="main-header">
    <nav class="navbar navbar-expand-lg">
      <div class="container d-flex justify-content-between align-items-center">

        <!-- Logo -->
        <a class="navbar-brand" href="HomePage.html">
          <h1 class="logo">Speak2hire</h1>
        </a>

        <!-- Main Links (center) -->
        <div class="collapse navbar-collapse justify-content-center" id="mainNav">
          <ul class="navbar-nav align-items-center gap-5 main-links">
            <li class="nav-item">
              <a class="nav-link text-white" href="HomePage.html"><i class="fa-solid fa-house"></i> Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#" id="interviewLink"><i class="fa-brands fa-rocketchat"></i> Mock Interview</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#" id="analysisLink"><i class="fa-solid fa-chart-line"></i> Analysis</a>
            </li>
          </ul>
        </div>

        <!-- Right Side: Dark Mode + Auth Links -->
        <div class="d-flex align-items-center gap-3">
         

          <!-- Auth Links -->
          <ul class="navbar-nav align-items-center gap-2" id="links">
            <li class="nav-item">
              <a href="login.html" class="login">Login</a>
            </li>
            <li class="nav-item">
              <a href="register.html" class="register">Register</a>
            </li>
          </ul>

          <!-- User Info (hidden by default) -->
          <ul id="user-info" class="navbar-nav align-items-center gap-3" style="display:none;">
            <li><a href="profile.html" id="user"></a></li>
            <li><a href="#" id="LogOut">Log Out</a></li>
          </ul>
        </div>
         
         <!-- Dark Mode Toggle -->
          <div id="darkModeToggle" class="ms-3">
            <i class="fa-solid fa-moon dark text-white" style="cursor:pointer; font-size: 1.5rem;"></i>
          </div>
      </div>
    </nav>
  </div>
</header>

  <!-- JOB SELECTION CARD -->
  <main class="container py-6 mt-5">
        <!-- Progress Indicator -->
    <div class="progress-steps">
      <span>1. Choose Type</span>
      <span  class="active">2. Setup</span>
      <span>3. Interview</span>
    </div>
    <h2 class="text-center mb-5">Pick Your Job Field & Experience Level</h2>
    <div class="card shadow-lg mx-auto" style="max-width: 900px;">
      <div class="row g-0">
        <div class="col-md-6">
          <img src="images/jobs.png" class="img-fluid rounded-start h-100 w-100 object-fit-cover" alt="Jobs">
        </div>
        <div class="col-md-6 d-flex align-items-center">
          <div class="card-body p-5 text-center">
            <h2 class="mb-4">Select Your Job Field</h2>

            <div class="mb-3">
              <select id="jobField" class="form-select">
                <option value="">-- Choose Job Field --</option>
              </select>
            </div>
               <div class="mb-3">
              <select id="experienceLevel" class="form-select">
                <option value="">-- Experience Level --</option>
              </select>
            </div>
            <button class="btn" onclick="startInterview()">Start Interview</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/selectjob.js"></script>
  <script src="js/user.js"></script>
<script src="js/script.js"></script>
</body>
</html>
