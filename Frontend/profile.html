<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/background.css">
    <link rel="stylesheet" href="css/CustomBootstrap.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <title>Profile</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <!-----------------------------------------------Header---------------------------------------------------->
     <!-- HEADER -->
<header class="fixed-top">
  <div class="main-header">
    <nav class="navbar navbar-expand-lg">
      <div class="container d-flex justify-content-between align-items-center">

        <!-- Logo -->
        <a class="navbar-brand" href="HomePage.html">
          <h1 class="logo">Speak2hire</h1>
        </a>

        <!-- Main Links (center) -->
        <div class="collapse navbar-collapse justify-content-center" id="mainNav">
          <ul class="navbar-nav align-items-center gap-5 main-links">
            <li class="nav-item">
              <a class="nav-link text-white" href="HomePage.html"><i class="fa-solid fa-house"></i> Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#" id="interviewLink"><i class="fa-brands fa-rocketchat"></i> Mock Interview</a>
            </li>
            <li class="nav-item">
              <a class="nav-link text-white" href="#" id="analysisLink"><i class="fa-solid fa-chart-line"></i> Analysis</a>
            </li>
          </ul>
        </div>

        <!-- Right Side: Dark Mode + Auth Links -->
        <div class="d-flex align-items-center gap-3">
         

          <!-- Auth Links -->
          <ul class="navbar-nav align-items-center gap-2" id="links">
            <li class="nav-item">
              <a href="login.html" class="login">Login</a>
            </li>
            <li class="nav-item">
              <a href="register.html" class="register">Register</a>
            </li>
          </ul>

          <!-- User Info (hidden by default) -->
          <ul id="user-info" class="navbar-nav align-items-center gap-3" style="display:none;">
            <li><a href="profile.html" id="user"></a></li>
            <li><a href="#" id="LogOut">Log Out</a></li>
          </ul>
        </div>
         
         <!-- Dark Mode Toggle -->
          <div id="darkModeToggle" class="ms-3">
            <i class="fa-solid fa-moon dark text-white" style="cursor:pointer; font-size: 1.5rem;"></i>
          </div>
      </div>
    </nav>
  </div>
</header>

    <!-----------------------------------------------Header End---------------------------------------------------->

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10 profile-card">
               <button type="button" id="delete-account-btn" class="btn">
                Delete Account
                </button>
            <div class="row g-4">
                <!-- LEFT SIDE -->
                <div class="col-md-4 d-flex flex-column align-items-center">
                    
                    <div class="profile-img-wrapper">
                        <img id="profile-img" src="images/images (1).jpeg" alt="Profile Picture">
                        <label for="upload-img" class="change-photo-btn">Change</label>
                        <input type="file" id="upload-img" accept="image/*">
                    </div>

                    <div class="w-100 mt-4">
                        <label class="fw-semibold mb-1">Profile Completeness</label>
                        <div class="progress">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>
                    </div>

                </div>

                <!-- RIGHT SIDE -->
                <div class="col-md-8">
                    <h3 class="mb-3" style="text-align: center;font-family: 'Lato', sans-serif;font-weight: 700;">Your Profile</h3>
                    <form class="row g-3" id="profile-form">

                        <div class="col-md-6">
                            <label>First Name</label>
                            <input type="text" id="first-name" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label>Last Name</label>
                            <input type="text" id="last-name" class="form-control">
                        </div>

                        <div class="col-12">
                            <label>Email</label>
                            <input type="email" id="email" class="form-control" readonly>
                        </div>

                        <div class="col-md-6">
                            <label>Phone</label>
                            <input type="text" id="phone" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label>Age</label>
                            <input type="number" id="age" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label>Nationality</label>
                            <input type="text" id="nationality" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label>City</label>
                            <input type="text" id="city" class="form-control">
                        </div>

                        <div class="col-12">
                            <label>Update CV</label>
                            <input type="file" id="cv-upload" class="form-control" accept=".pdf,.doc,.docx">
                        </div>

                          <div class="col-12 mt-4 d-flex justify-content-end">
                          <button type="button" id="save-btn" class="btn"> Save Changes </button></div>
                    </form>
                </div>

            </div>

        </div>
    </div>
</div>

<!-- Custom JS -->
<script src="js/profile.js"></script>
    <script src="js/user.js"></script>
</body>
</html>
