<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/CustomBootstrap.css">
    <link rel="stylesheet" href="css/register.css">
     <link rel="stylesheet" href="css/landingscape.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header class="fixed-top">
        <div class="main-header">
        <nav class="navbar">
        <div class="container">
        <a class="navbar-brand" href="HomePage.html">
        <h1 class="logo">Speak2hire</h1>
        </a>
        </div>
        </nav>
        </div>
    </header>

    <div class="container"style="padding-top:78px;">
        <div class="row">
            <!-- Left Image Side -->
            <div class="col-md-5 left-side d-none d-md-block"></div>

            <!-- Right Form Side -->
            <div class="col-12 col-md-7 right-side">
                <div class="register-section">
                      <h2 id="typewriter-title" class="mb-3 mt-2 align-items-center typewriter">Start Your Journey with Us</h2>
                    <form id="registerForm" class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name</label>
                            <input type="text" id="firstname" class="form-control shadow-sm" placeholder="John">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name</label>
                            <input type="text" id="lastname" class="form-control shadow-sm" placeholder="Doe">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control shadow-sm" placeholder="name@example.com">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Password</label>
                            <input type="password" id="password" class="form-control shadow-sm" required minlength="8" placeholder="********">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Phone</label>
                            <input type="text" id="phone" class="form-control" placeholder="+1234567890">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Age</label>
                            <input type="number" id="age" class="form-control" placeholder="25" min="0">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Nationality</label>
                            <input type="text" id="nationality" class="form-control" placeholder="American">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">City</label>
                            <input type="text" id="city" class="form-control" placeholder="New York">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Upload Your CV</label>
                            <input type="file" id="cv-upload" class="form-control" accept=".pdf,.doc,.docx">
                        </div>
                        <div class="col-12 form-check mt-2">
                            <input class="form-check-input" type="checkbox" id="remember">
                            <label class="form-check-label">Remember Me</label>
                        </div>
                        <div class="col-12 d-flex justify-content-center">
                            <button type="submit" class="btn log-in" id="sign_up" >Register</button>
                        </div>
                    </form>
                    <p class="mt-3 text-center">Have An Account? <a href="login.html">Log In</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/signin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
</body>
</html>
